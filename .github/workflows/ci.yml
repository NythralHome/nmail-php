name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - run: composer validate --strict
      - run: php -l src/NmailClient.php
      - run: php -l src/NmailException.php
      - run: php -l src/NmailValidationException.php
      - run: php test/syntax.php
