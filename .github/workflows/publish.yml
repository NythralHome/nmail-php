name: Publish

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: Type publish-nmail-php to notify Packagist
        required: true
        default: dry-run

jobs:
  packagist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - run: composer validate --strict
      - run: php -l src/NmailClient.php
      - run: php -l src/NmailException.php
      - run: php -l src/NmailValidationException.php
      - run: php test/syntax.php
      - name: Notify Packagist
        if: ${{ inputs.confirm_publish == 'publish-nmail-php' }}
        run: |
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"repository\":{\"url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}\"}}" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}"
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
